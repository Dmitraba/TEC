<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEC</title>
  <style>
    :root {
      --bg: #f6f2ea;
      --panel: #fffdf8;
      --line: #ddd3c5;
      --text: #2b2722;
      --muted: #6f675d;
      --accent: #1e1c19;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(221, 211, 197, 0.6), transparent 34%),
        linear-gradient(180deg, #f8f4ed 0%, #efe7da 100%);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }
    .card {
      background: rgba(255, 253, 248, 0.9);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 28px rgba(57, 46, 33, 0.06);
    }
    .eyebrow {
      font: 12px/1.2 Arial, sans-serif;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: clamp(40px, 8vw, 78px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0 0 14px;
      font: 20px/1.6 Arial, sans-serif;
      color: var(--muted);
      max-width: 42em;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    a.button {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      font: 14px/1.2 Arial, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    a.link {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--line);
      text-decoration: none;
      color: var(--text);
      background: transparent;
      font: 14px/1.2 Arial, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="eyebrow">TEC / Project Root</div>
      <h1>TEC</h1>
      <p>Это корневая страница публичного репозитория проекта. Вспомогательные guide-материалы по ботам сюда не входят и ведутся отдельно.</p>
      <p>Основной сайт и проектные материалы собираются поэтапно внутри репозитория и локальной рабочей папки.</p>
      <div class="links">
        <a class="button" href="https://github.com/Dmitraba/TEC">Открыть GitHub Repo</a>
        <a class="link" href="site/">Папка site</a>
      </div>
    </section>
  </main>
</body>
</html>
